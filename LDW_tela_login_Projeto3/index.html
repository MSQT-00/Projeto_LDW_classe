<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="welcome">BEM VINDO, <strong>FULANO</strong></div>
    <a href="#" class="home-button">🏠</a>
  </div>

  <div class="container">
    <h2>CADASTRO</h2>
    <form>
      <label for="nome">NOME: *</label>
      <input type="text" id="nome" required>

      <label for="email">EMAIL: *</label>
      <input type="email" id="email" required>

      <label for="ra">RA: *</label>
      <input type="text" id="ra" required>

      <label for="instituicao">INSTITUIÇÃO: *</label>
      <input type="text" id="instituicao" required>

      <div class="login-section">
        <label for="login">LOGIN: *</label>
        <input type="text" id="login" required>

        <label for="senha">SENHA: *</label>
        <input type="password" id="senha" required>

        <label for="repetir">REPETIR SENHA: *</label>
        <input type="password" id="repetir" required>
      </div>

      <button type="submit" class="button-submit">CADASTRAR</button>
    </form>
  </div>

  <div class="footer">
    <button class="exit-button">SAIR</button>
  </div>
  
</body>
</html>
