<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="loginstyle.css">
</head>
<style>
  html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      flex-direction: column;
    }
.container {
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      flex-grow: 1;
      width: 400px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    img{
        width: 100px;
        height: auto;
        margin: 0 auto;
    }
    .btn_enviar, .btn_esqueci_senha, .btn_cadastrar {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #2d3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
</style>
<body>
  
  <img src="../img/logo_CentroPaulaSouza.png">
  <img src="../img/fatec_ra_metropolitana_sp_maua_cor.png">


  <div class="container">
    <h2>AGENDA DO ALUNO</h2>
    <form>
      <label for="login">Login: *</label>
      <input type="text" id="login" required>

        <label for="senha">Senha: *</label>
        <input type="password" id="senha" required>

      <button type="button" class="btn_enviar">Entrar</button>
      <button type="button" class="btn_esqueci_senha">Esqueci a senha</button>
      <button type="button" href="index.html"  class="btn_cadastrar"></a>Cadastrar </button>
    </form>
  </div>

</body>
</html>
