<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu de opções</title>
    <link rel="stylesheet" href="style_model.css">
  </head>
   <style>
        .card {
            display: flex;
            flex-direction: column;
            background-color: rgb(229, 229, 229);
            padding: 5px;
            margin: 5px;
            align-items: center;
        }
        .card img{
            max-width: 100%;
        }
        .card p{
            color: rgb(66, 66, 66);
            font-size: large;
        }
        .card:hover{
            background-color: rgb(195, 193, 193);
        }
        .container{
            display: grid;
            grid-template-columns:50% 50% ;

        }
        .alinha-fim{
            display: flex;
            justify-content: end;
        }
        .alinha-fim img{
            width: 6em;
        }
        body{
          display: flex;
          justify-content: center;
        }
        a{
          text-decoration: none;
        }
        a:hover{
          text-decoration: underline;
          color: gray
        }

    </style>

  <body>  
     <header>
      <div class="welcome">BEM VINDO, <strong> FULANO</strong></div>
      <div class="home-button"><img class="img_icon_home" src="../img/casa-simples-fina.png"/></div>
  </header>

    <main>
      <div class="container">
        <a href="calendario.html">
          <div class="card">
            <img src="../img/calendario.png " />
            </span>
            <p>CALENDÁRIO</p>
          </div>
        </a>
        <a href="horario.html">
          <div class="card">
            <img src="../img/relogio.png " />
            <p>HORÁRIO</p>
          </div>
        </a>
        <a href="professores.html">
          <div class="card">
            <img src="../img/professor-no-quadro.png " />
            <p>PROFESSORES</p>
          </div>
        </a>
        <a href="alunos.html">
          <div class="card">
            <img src="../img/alunos.png " />
            <p>ALUNOS</p>
          </div>
        </a>
        <a href="tela_frequencia.html">
          <div class="card">
            <img src="../img/select_95365.png " />
            <p>FREQUÊNCIA</p>
          </div>
        </a>
        <a href="notas.html">
          <div class="card">
            <img src="../img/anotacao.png " />
            <p>NOTAS</p>
          </div>
        </a>
        <a href="anotacoes.html">
          <div class="card">
            <img src="../img/anotacao.webp " />
            <p>ANOTAÇÕES</p>
          </div>
        </a>
        <a href="profile.html">
          <div class="card">
            <img src="../img/perfil.png " />
            <p>MEU PERFIL</p>
          </div>
        </a>
      </div>
      <div class="alinha-fim">
        <a href="config.html">
          <img src="../img/settings.png">
        </a>
      </div>
    </main>
    
<footer>
      <button class="exit-button">SAIR</button>
</footer>
  </body>
</html>
