<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horário</title>
  <link rel="stylesheet" href="style_model.css">
  <style>

.container {
  width: 320px;
  padding: 20px;
  text-align: center;
}

.icon {
  width: 50px;
  margin-bottom: 10px;
}

h3 {
  font-size: 14px;
  margin-bottom: 20px;
}

.dias {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.dia {
  flex: 1;
  margin: 0 3px;
  padding: 8px 0;
  background: #e0e0e0;
  border: none;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  color: #333;
}

.dia.active {
  background-color: #007bff;
  color: white;
  font-weight: bold;
}

form.aulas {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

form.aulas label {
  text-align: left;
  font-size: 14px;
}

form.aulas input {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border: 1px solid #ccc;
  background: #f9f9f9;
  border-radius: 5px;
}

.botoes {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.edit img {
  width: 30px;
  cursor: pointer;
}

.save {
  background-color: #00c000;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>
 <header>
      <div class="welcome">BEM VINDO, <strong> FULANO</strong></div>
      <div class="home-button"><img class="img_icon_home" src="../img/casa-simples-fina.png" onclick="window.location='menu.html'"/></div>
  </header>
<body>
  <main>
  <div class="container">
    <img src="../img/schedule_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png" alt="Relógio" class="icon" />
    <h3>HORÁRIO</h3>

    <div class="dias">
      <button class="dia active">SEG</button>
      <button class="dia">TER</button>
      <button class="dia">QUA</button>
      <button class="dia">QUI</button>
      <button class="dia">SEX</button>
    </div>

    <form class="aulas">
      <label>1ª aula <input type="text" /></label>
      <label>2ª aula <input type="text" /></label>
      <label>3ª aula <input type="text" /></label>
      <label>4ª aula <input type="text" /></label>
    </form>

    <div class="botoes">
      <button class="edit">
        <img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" alt="Editar" />
      </button>
      <button class="save">GRAVAR</button>
    </div>
  </div>

  <script src="/horario.js"></script>
  </main>
<footer>
      <button class="exit-button">SAIR</button>
</footer>

</body>
</html>
