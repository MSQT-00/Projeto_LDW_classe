<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professores</title>
  <link rel="stylesheet" href="style_model.css"> <!-- CSS PADRÃO -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
    }

    .welcome {
      font-size: 18px;
    }

    .img_icon_home {
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    main {
      padding: 30px;
    }

    .alunos-section {
      text-align: center;
    }

    .icon {
      width: 60px;
      margin-bottom: 10px;
    }

    .alunos-section h2 {
      margin-top: 0;
      font-size: 24px;
      font-weight: 600;
    }

    .search {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search label {
      font-weight: bold;
      font-size: 16px;
    }

    .search select {
      padding: 8px;
      font-size: 16px;
      min-width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .card {
      margin: 0 auto;
      max-width: 400px;
      background-color: #f7f7f7;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px #ddd;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      max-height: 180px;
      object-fit: cover;
    }

    .card h3 {
      margin: 15px 0 5px;
      font-size: 22px;
    }

    .card p {
      font-size: 16px;
      margin: 5px 0;
    }

    .card strong {
      color: #333;
    }

    footer {
      display: flex;
      justify-content: center;
      padding: 20px;
  
    }

    .exit-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #c33;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .edit{
    margin-top:30px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.edit img {
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.save {
  background-color: #00c000;
  color: white;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  padding: 0 15px;
  height: 35px;

}
.botoes{
  display: flex;
  justify-content: space-between;
  flex-direction: row;
  align-items: center;
}
  </style>
</head>
<body>

  <header>
    <div class="welcome">BEM VINDO, <strong>FULANO</strong></div>
    <a href="menu.html">
      <div class="home-button"><img class="img_icon_home" src="../img/casa-simples-fina.png" alt="Início"></div>
    </a>
  </header>

  <main>
    
      <div class="alunos-section">
        <img src="../img/professor_icon.png" alt="Professores" class="icon">
        <h2>PROFESSORES</h2>

        <div class="search">
          <label for="studentSelect">BUSCAR:</label>
          <select id="studentSelect">
            <option value="eldima">Eldima Bindá</option>
            <option value="stephen">Stephen Hawking</option>
            <option value="albert">Albert Einstein</option>
          </select>
        </div>

        <div id="studentCard" class="card">
          <img id="studentImage" src="../img/icon_pessoa.png" alt="Foto do professor">
          <h3 id="studentName">Selecione um professor</h3>
          <p><strong>EMAIL:</strong> <span id="studentEmail">---</span></p>
          <p><strong>CONTATO:</strong> <span id="studentContact">---</span></p>
        </div>
      </div>

       <div class="botoes">

      <button class="edit">
        <img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" alt="Editar" />
      </button>
      <button class="save">GRAVAR</button>
    </div>
    
  </main>

  <footer>
    <button class="exit-button">SAIR</button>
  </footer>

  <script src="../professores.js"></script>
</body>
</html>
