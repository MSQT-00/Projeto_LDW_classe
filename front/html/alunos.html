<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gerenciamento de alunos">
  <title>Alunos - Sistema Acadêmico</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <div id="header"></div>

  <main>
    <div class="container">
      <div class="alunos-section">
        <img src="/src/assets/images/grupo.png" alt="Alunos" class="icon mb-2">
        <h2 class="text-center mb-4">ALUNOS</h2>

        <div class="search mb-4">
          <label for="studentSelect">BUSCAR:</label>
          <select id="studentSelect" class="form-control">
            <option value="">Selecione um aluno...</option>
          </select>
        </div>

        <div id="studentCard" class="card">
          <img id="studentImage" src="/src/assets/images/default-student.png" alt="Foto do aluno" class="mb-2">
          <h3 id="studentName" class="mb-2"></h3>
          <p class="mb-1"><strong>EMAIL:</strong> <span id="studentEmail"></span></p>
          <p class="mb-1"><strong>CONTATO:</strong> <span id="studentContact"></span></p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script type="module">
    import { PeopleManager } from '/src/js/modules/peopleManager.js';
    import { isAuthenticated } from '/src/js/modules/auth.js';

    // Check authentication
    if (!isAuthenticated()) {
      window.location.href = 'tela_login.html';
    }

    // Initialize components
    document.getElementById('header').innerHTML = await fetch('/src/components/header.html').then(r => r.text());
    document.getElementById('footer').innerHTML = await fetch('/src/components/footer.html').then(r => r.text());

    // Initialize student manager
    const studentManager = new PeopleManager('student');
  </script>
</body>
</html>
